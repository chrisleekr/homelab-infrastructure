---
# `kubeadm upgrade apply` mutates cluster-wide state and only runs on the control plane.
# Workers upgrade with `kubeadm upgrade node`, which is not yet implemented.
#
# kubeadm_node_installed_version is set by the kubeadm_node role, which runs first via
# this role's meta dependency.
- name: Check if kubeadm cluster is initialized
  ansible.builtin.stat:
    path: /etc/kubernetes/admin.conf
  register: kubeadm_server_cluster_initialized

- name: Perform kubeadm cluster upgrade
  when: >
    kubeadm_server_cluster_initialized.stat.exists and
    kubeadm_node_installed_version is defined and
    kubeadm_node_installed_version is version(kubeadm_version, '<')
  block:
    - name: Run kubeadm upgrade plan
      ansible.builtin.command: kubeadm upgrade plan
      register: kubeadm_server_upgrade_plan_output
      become: true
      changed_when: false

    - name: Display kubeadm upgrade plan output
      ansible.builtin.debug:
        msg: "{{ kubeadm_server_upgrade_plan_output.stdout }}"

    - name: Set upgrade command using inventory version
      ansible.builtin.set_fact:
        kubeadm_server_upgrade_command: "kubeadm upgrade apply v{{ kubeadm_version }} --yes"

    - name: Display planned upgrade command
      ansible.builtin.debug:
        msg: |
          Executing automated cluster upgrade: {{ kubeadm_server_upgrade_command }}

    - name: Execute kubeadm cluster upgrade
      ansible.builtin.command: "{{ kubeadm_server_upgrade_command }}"
      register: kubeadm_server_upgrade_apply_output
      become: true
      changed_when: false
      when: kubeadm_server_upgrade_command is defined and kubeadm_server_upgrade_command | length > 0

    - name: Display upgrade output
      ansible.builtin.debug:
        msg: "{{ kubeadm_server_upgrade_apply_output.stdout }}"

    - name: Verify cluster upgrade success
      ansible.builtin.assert:
        that:
          - kubeadm_server_upgrade_apply_output.stdout is search('\\[upgrade\\] SUCCESS!')
          - kubeadm_server_upgrade_apply_output.stdout is search('was upgraded to')
        success_msg: "Cluster upgrade completed successfully!"
        fail_msg: "Cluster upgrade verification failed. Please check the output manually."

- name: Restart kubelet service after upgrade
  when: >
    kubeadm_node_installed_version is defined and
    kubeadm_node_installed_version is version(kubeadm_version, '<')
  ansible.builtin.systemd:
    name: kubelet
    state: restarted
  become: true
